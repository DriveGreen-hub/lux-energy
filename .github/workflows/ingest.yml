name: Ingest energy data

on:
  schedule:
    # Every 15 minutes, matching ENTSO-E's native resolution.
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # allows manual trigger for backfills/debugging

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/ingest.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
